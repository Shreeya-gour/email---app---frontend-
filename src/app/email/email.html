<div class="container">
    <div class="card">
      <form (ngSubmit)="doSubmitForm()">
<h1>Compose Email</h1>


<mat-form-field class="field" appearance="outline">
    <mat-label>To</mat-label>
    <input name="to" [(ngModel)]="data.to" matInput>
  </mat-form-field>

  <mat-form-field class="field"appearance="outline">
    <mat-label>Subject</mat-label>
    <input name="subject" [(ngModel)]="data.subject" matInput>
  </mat-form-field>
  <mat-form-field class="example-full-width" class="field" appearance="outline">
    <mat-label>Enter Your Message</mat-label>
    <textarea rows="5" name="message" [(ngModel)]="data.message"matInput placeholder="Hey..What is doing"></textarea>
  </mat-form-field>
  <div class="text-center">
    <button type="submit" mat-raised-button >Send</button>
    <button type="reset" mat-raised-button >Reset</button>
  </div>
  </form>
    </div>
</div>
